image:
  repository: "445567074640.dkr.ecr.us-east-1.amazonaws.com/order-service"
  tag: "03a63b92017d2876924589b2d6fcc2ad7847ba50"
  pullPolicy: Always

replicaCount: 3
app:
  version: "v1.0.0"
  cpuBurnSeconds: "0.1"   # Controls CPU load per request — raise this to trigger HPA

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 15
  targetCPUUtilizationPercentage: 60   # Lower than frontend — order-service scales faster

pdb:
  enabled: true
  minAvailable: 2

namespace: demo
