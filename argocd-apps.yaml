# ArgoCD App-of-Apps: One manifest to rule them all.
# Apply this single file to ArgoCD and it deploys all 3 services automatically.
# GitHub username: koushik617kk
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shop-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/koushik617kk/eks-shop-helm.git
    targetRevision: main
    path: shop-frontend
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true       # Delete resources removed from Git
      selfHeal: true    # Revert any manual kubectl changes (configuration drift protection)
    syncOptions:
      - CreateNamespace=true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/koushik617kk/eks-shop-helm.git
    targetRevision: main
    path: order-service
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: file-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/koushik617kk/eks-shop-helm.git
    targetRevision: main
    path: file-service
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
