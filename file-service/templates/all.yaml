{{- if .Values.storage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: file-service-pvc
  namespace: {{ .Values.namespace }}
  labels:
    app: file-service
spec:
  accessModes:
    - ReadWriteOnce         # EBS: only 1 node can mount at a time
  storageClassName: {{ .Values.storage.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.storage.size }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service
  namespace: {{ .Values.namespace }}
  labels:
    app: file-service
    version: {{ .Values.app.version | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  # CRITICAL for stateful services with ReadWriteOnce PVCs:
  # Rolling update would deadlock — new pod waits for PVC, old pod never dies.
  # Recreate kills old pod first → EBS detaches → new pod attaches → no deadlock.
  # Trade-off: ~30 second downtime during deploy (acceptable for stateful storage service)
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: file-service
  template:
    metadata:
      labels:
        app: file-service
        version: {{ .Values.app.version | quote }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      # ── Pod Security Context ──────────────────────────────────────────────────
      # fsGroup: Kubernetes chowns the EBS volume to this GID on mount.
      # Without this, EBS mounts as root:root and non-root appuser (UID 1000) gets
      # Permission denied when trying to write to /data.
      securityContext:
        fsGroup: 1000        # Kubernetes chowns the EBS volume to this GID on mount
        runAsNonRoot: true   # Safety: prevents running as root
        runAsUser: 1000      # REQUIRED: numeric UID so k8s can verify runAsNonRoot
        runAsGroup: 1000     # Numeric GID to match fsGroup

      # ── AZ Affinity ──────────────────────────────────────────────────────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: file-service
              topologyKey: "kubernetes.io/hostname"

      containers:
        - name: file-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5000

          env:
            - name: APP_VERSION
              value: {{ .Values.app.version | quote }}
            - name: STORAGE_PATH
              value: {{ .Values.app.storagePath | quote }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName   # Injected so logs show which node

          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

          volumeMounts:
            - name: file-storage
              mountPath: {{ .Values.app.storagePath }}   # Mounts PVC at /data

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health     # Health check also verifies PVC is writable!
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5

      volumes:
        - name: file-storage
          persistentVolumeClaim:
            claimName: file-service-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: file-service
  namespace: {{ .Values.namespace }}
  labels:
    app: file-service
spec:
  type: ClusterIP
  selector:
    app: file-service
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
---
{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: file-service-pdb
  namespace: {{ .Values.namespace }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      app: file-service
{{- end }}
