image:
  repository: "381492206162.dkr.ecr.us-east-1.amazonaws.com/file-service"
  tag: "80ea2e129c84728113b60e56c8eae869b14945fe"
  pullPolicy: Always

# MUST be 1 for a single ReadWriteOnce EBS PVC.
# EBS can only attach to ONE node at a time — 2 replicas with 1 PVC = Pod-2 stuck Pending forever.
# For multi-replica stateful workloads, use StatefulSet with volumeClaimTemplates (1 PVC per pod).
replicaCount: 1

app:
  version: "v1.0.0"
  storagePath: "/data"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

# ── Persistent Volume Claim ────────────────────────────────────────────────────
storage:
  enabled: true
  storageClassName: gp3
  size: 5Gi

pdb:
  enabled: true
  # With replicas:1, minAvailable:1 would permanently block ALL node drains.
  # Setting to 0 allows voluntary disruptions (drains) while still recording the PDB object.
  minAvailable: 0

namespace: demo
