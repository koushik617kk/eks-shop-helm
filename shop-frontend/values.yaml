# ─── Image ─────────────────────────────────────────────────────────────────────
image:
  repository: "619054165770.dkr.ecr.us-east-1.amazonaws.com/shop-frontend"
  tag: "09f35338591e7592223b4e99b021910fddae633e"
  pullPolicy: Always

# ─── Replicas & Scaling ────────────────────────────────────────────────────────
replicaCount: 3               # Spread across 3 AZs via topologySpreadConstraints

# ─── App Config ────────────────────────────────────────────────────────────────
app:
  version: "v1.0.0"
  orderServiceUrl: "http://order-service.demo.svc.cluster.local:5000"
  fileServiceUrl:  "http://file-service.demo.svc.cluster.local:5000"

# ─── Resources ─────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# ─── HPA ────────────────────────────────────────────────────────────────────────
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# ─── Pod Disruption Budget ─────────────────────────────────────────────────────
pdb:
  enabled: true
  minAvailable: 2

# ─── Ingress (AWS ALB) ─────────────────────────────────────────────────────────
ingress:
  enabled: true
  groupName: "eks-demo-alb"   # All 3 services share 1 physical ALB
  scheme: "internet-facing"
  targetType: "ip"
  certificateArn: ""          # Set to your ACM ARN when TLS is configured
  host: "shop.demo.example.com"

# ─── Namespace ─────────────────────────────────────────────────────────────────
namespace: demo
